<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Silene Cruz | Frontend Dev</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <button id="magic-button" class="floating-btn">Dark Mode 🌓</button>

    <main class="container">
      <div class="card">
        <div id="loader" class="skeleton-container">
          <div class="skeleton avatar"></div>
          <div class="skeleton text title"></div>
          <div class="skeleton text phrase"></div>
        </div>

        <div id="github-content" style="display: none">
          <div class="avatar-container">
            <img id="github-avatar" src="" alt="Foto" />
          </div>
          <h1 id="github-name"></h1>
          <p id="github-bio"></p>
        </div>

        <hr />

        <div class="links-container">
          <a href="https://github.com/silenacruz" class="boton" target="_blank"
            >GitHub</a
          >
          <a
            href="https://www.linkedin.com/in/silenecruz/"
            class="boton"
            target="_blank"
            >LinkedIn</a
          >
          <a href="./contact.html" class="boton">Contact</a>
        </div>
      </div>
    </main>

    <script src="./main.js"></script>
  </body>
</html>
